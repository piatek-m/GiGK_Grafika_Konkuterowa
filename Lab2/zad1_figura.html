<!DOCTYPE html>
<html>

<head>
    <title>Canvas Graphics</title>
    <script>
        var canvas;
        var graphics;

        function drawBody() {

            graphics.beginPath();
            graphics.moveTo(0, 150);    // Starting from top-left corner of left horizontal rectangle
            graphics.lineTo(150, 150);
            graphics.lineTo(150, 0);
            graphics.lineTo(300, 0);    // Top right of vertical rectangle
            graphics.lineTo(300, 150);
            graphics.lineTo(450, 150);
            graphics.lineTo(450, 300);  // Bottom-right of horizontal rectangle
            graphics.lineTo(300, 300);
            graphics.lineTo(300, 450);
            graphics.lineTo(150, 450);  // Bottom-left of vertical rectangle
            graphics.lineTo(150, 300);
            graphics.lineTo(0, 300);
            graphics.lineTo(0, 150);    // Back to top-left of horizontal rectangle

            // Body color
            graphics.fillStyle = "#fe0000";
            graphics.fill();

            // Body outline
            graphics.lineWidth = 3;
            graphics.strokeStyle = "black";
            graphics.stroke();

        }

        function drawEye() {
            // Sclera
            graphics.beginPath();
            graphics.arc(30, 37.5, 25, 0, 2 * Math.PI);
            graphics.fillStyle = "white";
            graphics.fill();
            graphics.closePath();
            // Iris
            graphics.beginPath();
            graphics.arc(30, 37.5, 15, 0, 2 * Math.PI);
            graphics.fillStyle = "black";
            graphics.fill();
            graphics.closePath();
            // Glint
            graphics.beginPath();
            graphics.arc(24, 31, 6, 0, 2 * Math.PI);
            graphics.fillStyle = "white";
            graphics.fill();
        }

        function drawSmile() {
            graphics.beginPath();
            graphics.translate(150, 300);
            // Lower lip
            graphics.moveTo(20, -37.5);
            graphics.bezierCurveTo(68, 12, 90, 12, 130, -37.5);
            // Upper lip
            graphics.bezierCurveTo(110, -20, 39, -22, 20, -37.5);

            graphics.closePath();
            graphics.fillStyle = "black";
            graphics.fill();

            graphics.save();

            // Left crease
            function crease() {
                graphics.moveTo(21, -46);
                graphics.bezierCurveTo(22, -37.5, 24, -37.5, 15, -30);
            }
            crease();
            // Right crease
            graphics.save();
            graphics.translate(150, 0);
            graphics.scale(-1, 1);
            crease();
            graphics.restore();

            graphics.strokeStyle = "black";
            graphics.stroke();
        }

        function drawTeeth() {
            graphics.beginPath();
            graphics.lineTo(-4, 15);
            graphics.bezierCurveTo(2, 20, 15, 19, 21, 16);
            graphics.lineTo(21, -0.5);
            graphics.bezierCurveTo(15, 0, 5, 0, -4, 0);
            graphics.lineTo(-4, 15);

            graphics.fillStyle = "white";
            graphics.fill();
            graphics.closePath();

            graphics.beginPath();
            graphics.strokeStyle = "black";
            graphics.lineWidth = 1.5;
            graphics.moveTo(9.5, 0);
            graphics.lineTo(9.5, 20);
            graphics.stroke();

        }

        function init() {
            canvas = document.getElementById("theCanvas");
            graphics = canvas.getContext("2d");
            graphics.lineWidth = 3;
            graphics.strokeRect(0, 0, canvas.width, canvas.height); // Canvas border

            graphics.translate(225, 5); // Center on canvas for mirroring and to avoid edge clipping
            drawBody();

            // Left eye
            graphics.translate(150, 150);
            drawEye();
            // Right eye
            graphics.translate(90, 0);
            drawEye();

            graphics.resetTransform();
            graphics.translate(225, 5);
            drawSmile();

            graphics.resetTransform();
            graphics.translate(445, 280);
            drawTeeth();
        }
    </script>
</head>

<body onload="init()"
    style="background-color: rgb(195, 195, 195); display: flex; justify-content: center; align-items: center; min-height: 90vh;">
    <!-- Center vertically -->
    <canvas id="theCanvas" width="900" height="460" style="background-color: white;"></canvas>
</body>

</html>
